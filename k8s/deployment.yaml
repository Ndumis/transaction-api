apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-api
  labels:
    app: transaction-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-api
  template:
    metadata:
      labels:
        app: transaction-api
    spec:
      containers:
      - name: transaction-api
        image: transaction-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8484
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: SPRING_DATASOURCE_USERNAME
          value: "sa"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        # Temporarily disable probes for testing
        # livenessProbe:
        #   httpGet:
        #     path: /actuator/health
        #     port: 8484
        #   initialDelaySeconds: 90
        #   periodSeconds: 30
        # readinessProbe:
        #   httpGet:
        #     path: /actuator/health
        #     port: 8484
        #   initialDelaySeconds: 70
        #   periodSeconds: 15