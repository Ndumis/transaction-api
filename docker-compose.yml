version: '3.8'

services:
  transaction-api:
    build: .
    container_name: transaction-aggregation-api
    ports:
      - "8484:8484"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # These environment variables will override the YAML settings
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:transactiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
      - SERVER_PORT=8484
    volumes:
      - ./logs:/logs
    networks:
      - transaction-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8484/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  transaction-network:
    driver: bridge